version: '3.8'

services:
  azure-devops-mcp:
    image: azure-devops-mcp:latest
    container_name: azure-devops-mcp-server
    stdin_open: true
    tty: true
    environment:
      # Replace these with your actual values or use .env file
      - AZURE_DEVOPS_PAT=${AZURE_DEVOPS_PAT}
      - AZURE_DEVOPS_ORG_URL=${AZURE_DEVOPS_ORG_URL}
      - AZURE_DEVOPS_USERNAME=${AZURE_DEVOPS_USERNAME:-}
      - AZURE_DEVOPS_PROJECT=${AZURE_DEVOPS_PROJECT:-}
    restart: unless-stopped
    # Uncomment to use .env file from host
    # env_file:
    #   - .env

# To use with .env file:
# 1. Copy .env.example to .env
# 2. Fill in your credentials
# 3. Uncomment env_file lines above
# 4. Run: docker-compose up -d
